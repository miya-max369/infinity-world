<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INFINITY WORLD ∞ — フリンジ理論マップ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Noto+Serif+JP:wght@300;400;700&family=Share+Tech+Mono&display=swap');

:root {
  --void: #02040a;
  --deep: #060b18;
  --electric: #00f5ff;
  --plasma: #bf00ff;
  --gold: #ffd700;
  --amber: #ff8c00;
  --jade: #00ff9f;
  --blush: #ff3d8a;
  --white: #e0eaff;
  --dim: #3a4a70;
  --panel-bg: rgba(4, 10, 28, 0.97);
}

* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100%; height:100%;
  background: var(--void);
  overflow: hidden;
  font-family: 'Noto Serif JP', serif;
  color: var(--white);
  cursor: crosshair;
}

/* ─── CANVAS LAYER ─── */
#bg-canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
}

#map-canvas {
  position: fixed;
  inset: 0;
  z-index: 1;
  cursor: crosshair;
}

/* ─── HEADER ─── */
#header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 10;
  padding: 18px 32px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: linear-gradient(to bottom, rgba(2,4,10,0.95), transparent);
  pointer-events: none;
}

#logo {
  pointer-events: all;
}

.logo-main {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(14px, 2.5vw, 22px);
  font-weight: 900;
  background: linear-gradient(90deg, var(--gold), var(--electric), var(--plasma));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 3px;
  line-height: 1;
}

.logo-sub {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  letter-spacing: 5px;
  color: var(--dim);
  margin-top: 4px;
}

/* ─── FILTER BAR ─── */
#filters {
  position: fixed;
  top: 74px; left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
  padding: 0 20px;
}

.filter-btn {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  letter-spacing: 2px;
  padding: 6px 14px;
  border: 1px solid;
  background: rgba(2,4,10,0.8);
  cursor: pointer;
  transition: all 0.25s;
  text-transform: uppercase;
}

.filter-btn[data-cat="all"]    { border-color: var(--white);    color: var(--white); }
.filter-btn[data-cat="cosmos"] { border-color: var(--electric); color: var(--electric); }
.filter-btn[data-cat="earth"]  { border-color: var(--jade);     color: var(--jade); }
.filter-btn[data-cat="history"]{ border-color: var(--gold);     color: var(--gold); }
.filter-btn[data-cat="mind"]   { border-color: var(--plasma);   color: var(--plasma); }
.filter-btn[data-cat="tech"]   { border-color: var(--blush);    color: var(--blush); }

.filter-btn.active, .filter-btn:hover {
  background: rgba(255,255,255,0.12);
  transform: translateY(-1px);
}

/* ─── DETAIL PANEL ─── */
#panel {
  position: fixed;
  right: -460px;
  top: 0; bottom: 0;
  width: min(440px, 100vw);
  z-index: 20;
  background: var(--panel-bg);
  border-left: 1px solid rgba(0,245,255,0.2);
  display: flex;
  flex-direction: column;
  transition: right 0.5s cubic-bezier(0.16,1,0.3,1);
  backdrop-filter: blur(20px);
  overflow: hidden;
}

#panel.open { right: 0; }

#panel-header {
  padding: 24px 28px 20px;
  border-bottom: 1px solid rgba(0,245,255,0.1);
  position: relative;
}

#panel-category {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  letter-spacing: 4px;
  margin-bottom: 10px;
}

#panel-title {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(16px, 3vw, 22px);
  font-weight: 700;
  line-height: 1.3;
  background: linear-gradient(135deg, var(--gold), var(--electric));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

#close-btn {
  position: absolute;
  top: 20px; right: 20px;
  width: 32px; height: 32px;
  border: 1px solid var(--dim);
  background: none;
  color: var(--dim);
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
#close-btn:hover { border-color: var(--electric); color: var(--electric); }

#panel-body {
  flex: 1;
  overflow-y: auto;
  padding: 24px 28px;
  scrollbar-width: thin;
  scrollbar-color: var(--dim) transparent;
}

#panel-desc {
  font-size: 14px;
  line-height: 2;
  color: rgba(224,234,255,0.75);
  margin-bottom: 24px;
  padding-bottom: 24px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

#ai-section-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  letter-spacing: 4px;
  color: var(--electric);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}

#ai-section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: rgba(0,245,255,0.2);
}

#ai-response {
  font-size: 14px;
  line-height: 2;
  color: rgba(224,234,255,0.85);
  min-height: 80px;
}

.ai-loading {
  display: flex;
  gap: 6px;
  align-items: center;
  color: var(--electric);
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px;
}

.dot-pulse {
  display: flex; gap: 4px;
}
.dot-pulse span {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--electric);
  animation: dp 1.4s infinite ease-in-out;
}
.dot-pulse span:nth-child(2) { animation-delay: 0.2s; }
.dot-pulse span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dp { 0%,80%,100%{transform:scale(0.6);opacity:0.3} 40%{transform:scale(1);opacity:1} }

#panel-tags {
  margin-top: 24px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.tag {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  letter-spacing: 1px;
  padding: 4px 10px;
  border: 1px solid rgba(255,255,255,0.15);
  color: rgba(224,234,255,0.5);
}

/* ─── TOOLTIP ─── */
#tooltip {
  position: fixed;
  z-index: 15;
  pointer-events: none;
  background: rgba(4,10,28,0.95);
  border: 1px solid rgba(0,245,255,0.3);
  padding: 10px 16px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px;
  letter-spacing: 1px;
  white-space: nowrap;
  opacity: 0;
  transition: opacity 0.2s;
  backdrop-filter: blur(10px);
}

/* ─── HINT ─── */
#hint {
  position: fixed;
  bottom: 28px; left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--dim);
  animation: hint-blink 3s infinite;
  pointer-events: none;
  white-space: nowrap;
}
@keyframes hint-blink { 0%,100%{opacity:0.3} 50%{opacity:0.8} }

/* ─── API KEY INPUT ─── */
#apikey-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 30;
  background: rgba(2,4,10,0.97);
  border-top: 1px solid rgba(0,245,255,0.15);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  gap: 12px;
}

#apikey-bar label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--electric);
  white-space: nowrap;
  flex-shrink: 0;
}

#apikey-input {
  flex: 1;
  background: rgba(0,245,255,0.05);
  border: 1px solid var(--dim);
  color: var(--white);
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px;
  padding: 8px 14px;
  outline: none;
  transition: border-color 0.2s;
}
#apikey-input:focus { border-color: var(--electric); }
#apikey-input::placeholder { color: var(--dim); }

#apikey-save {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  letter-spacing: 2px;
  padding: 8px 18px;
  background: none;
  border: 1px solid var(--electric);
  color: var(--electric);
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
#apikey-save:hover { background: rgba(0,245,255,0.1); }

/* ─── NODE COUNT ─── */
#node-count {
  position: fixed;
  top: 74px; right: 24px;
  z-index: 10;
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--dim);
  text-align: right;
}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }
</style>
</head>

<canvas id="map-canvas"></canvas>

<div id="tooltip"></div>

    desc:'テスラ・ニコラらが発明した真空エネルギー・スカラー波エネルギーを利用した無限エネルギー装置は実在するが、石油・エネルギー企業の利権により発明者が暗殺・技術が隠蔽されているという説。',
    tags:['ニコラ・テスラ','スカラー波','ゼロポイント','エネルギー支配'] },
  { id:'deepstate', cat:'history', label:'ディープステート',  en:'DEEP STATE',          x:0.86, y:0.44, r:22, color:'#ffd700',
    desc:'民主的プロセスの外側に存在し、歴代政府・メディア・金融を影から支配するエリート集団。イルミナティ、フリーメーソン、ビルダーバーグ会議などが実体とされ、人口削減・新世界秩序樹立を目標とするとされる。',
    tags:['イルミナティ','新世界秩序','支配層','シャドーガバメント'] },
];

// ══════════════════════════════════════
//  STATE
// ══════════════════════════════════════
let apiKey = localStorage.getItem('iw_apikey') || '';
let activeFilter = 'all';
let selectedNode = null;
let hoveredNode = null;
let panelOpen = false;
let dragging = false, dragStart = {x:0,y:0}, viewOffset = {x:0,y:0}, lastOffset = {x:0,y:0};

// Restore API key
if (apiKey) {
  document.getElementById('apikey-input').value = apiKey.slice(0,8) + '••••••••';
}

function saveKey() {
  const val = document.getElementById('apikey-input').value.trim();
  if (val && !val.includes('•')) {
    apiKey = val;
    localStorage.setItem('iw_apikey', apiKey);
    document.getElementById('apikey-input').value = apiKey.slice(0,8) + '••••••••';
    document.getElementById('apikey-save').textContent = '✓ OK';
    setTimeout(() => document.getElementById('apikey-save').textContent = 'CONNECT', 2000);
  }
}

// ══════════════════════════════════════
//  BACKGROUND CANVAS (particles + sacred geometry)
// ══════════════════════════════════════
const bgCanvas = document.getElementById('bg-canvas');
const bgCtx = bgCanvas.getContext('2d');
let W, H;
let particles = [];
let time = 0;

function resizeCanvas() {
  W = bgCanvas.width = document.getElementById('map-canvas').width = window.innerWidth;
  H = bgCanvas.height = document.getElementById('map-canvas').height = window.innerHeight;
}

class Particle {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.vx = (Math.random() - 0.5) * 0.3;
    this.vy = (Math.random() - 0.5) * 0.3;
    this.size = Math.random() * 1.8 + 0.3;
    this.alpha = Math.random() * 0.6 + 0.1;
    this.hue = Math.random() > 0.7 ? (Math.random() > 0.5 ? 185 : 280) : 50;
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    if (this.x < 0 || this.x > W || this.y < 0 || this.y > H) this.reset();
  }
  draw(ctx) {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
    ctx.fillStyle = `hsla(${this.hue},100%,70%,${this.alpha})`;
    ctx.fill();
  }
}

function initParticles() {
  particles = Array.from({length: 200}, () => new Particle());
}

function drawBackground() {
  bgCtx.clearRect(0,0,W,H);

  // Deep space gradient
  const grad = bgCtx.createRadialGradient(W*0.5, H*0.5, 0, W*0.5, H*0.5, Math.max(W,H)*0.7);
  grad.addColorStop(0, '#06102a');
  grad.addColorStop(0.5, '#03060f');
  grad.addColorStop(1, '#02040a');
  bgCtx.fillStyle = grad;
  bgCtx.fillRect(0,0,W,H);

  // Sacred geometry — flower of life faint
  bgCtx.save();
  bgCtx.globalAlpha = 0.025;
  bgCtx.strokeStyle = '#00f5ff';
  bgCtx.lineWidth = 0.5;
  const cx = W*0.5, cy = H*0.5;
  const rg = Math.min(W,H)*0.06;
  for (let i=0; i<7; i++) {
    const ax = i===0 ? cx : cx + rg*Math.cos((i-1)*Math.PI/3);
    const ay = i===0 ? cy : cy + rg*Math.sin((i-1)*Math.PI/3);
    bgCtx.beginPath();
    bgCtx.arc(ax, ay, rg, 0, Math.PI*2);
    bgCtx.stroke();
  }
  bgCtx.restore();

  // Grid
  bgCtx.save();
  bgCtx.globalAlpha = 0.04;
  bgCtx.strokeStyle = '#00f5ff';
  bgCtx.lineWidth = 0.5;
  const gs = 80;
  for (let x=0; x<W; x+=gs) { bgCtx.beginPath(); bgCtx.moveTo(x,0); bgCtx.lineTo(x,H); bgCtx.stroke(); }
  for (let y=0; y<H; y+=gs) { bgCtx.beginPath(); bgCtx.moveTo(0,y); bgCtx.lineTo(W,y); bgCtx.stroke(); }
  bgCtx.restore();

  // Particles
  particles.forEach(p => { p.update(); p.draw(bgCtx); });

  // Nebula blobs
  const blobs = [
    {x:0.2,y:0.3,r:0.25,hue:260,a:0.06},
    {x:0.75,y:0.65,r:0.3,hue:180,a:0.05},
    {x:0.5,y:0.8,r:0.2,hue:40,a:0.04},
  ];
  blobs.forEach(b => {
    const ng = bgCtx.createRadialGradient(W*b.x,H*b.y,0,W*b.x,H*b.y,Math.max(W,H)*b.r);
    ng.addColorStop(0, `hsla(${b.hue},100%,60%,${b.a})`);
    ng.addColorStop(1, 'transparent');
    bgCtx.fillStyle = ng;
    bgCtx.fillRect(0,0,W,H);
  });
}

// ══════════════════════════════════════
//  MAP CANVAS
// ══════════════════════════════════════
const mapCanvas = document.getElementById('map-canvas');
const mapCtx = mapCanvas.getContext('2d');

const CAT_COLORS = {
  cosmos:  '#00f5ff',
  earth:   '#00ff9f',
  history: '#ffd700',
  mind:    '#bf00ff',
  tech:    '#ff3d8a',
};

const CONNECTIONS = [
  ['flatearth','firmament'], ['flatearth','hollow'], ['firmament','hollow'],
  ['hollow','anunnaki'], ['anunnaki','planet9'], ['anunnaki','ancient_tech'],
  ['tartaria','mud_flood'], ['tartaria','ancient_tech'],
  ['katakamuna','kotodama'], ['kotodama','akashic'],
  ['simulation','multiverse'], ['simulation','akashic'], ['simulation','dmt'],
  ['haarp','deepstate'], ['cern','deepstate'], ['5g','deepstate'],
  ['freeenergy','deepstate'], ['freeenergy','haarp'],
  ['morphic','akashic'], ['morphic','kotodama'],
  ['dmt','akashic'], ['multiverse','cern'],
  ['anunnaki','deepstate'], ['planet9','firmament'],
];

function nodePos(node) {
  return {
    x: node.x * W + viewOffset.x,
    y: node.y * H + viewOffset.y,
  };
}

function visibleNodes() {
  if (activeFilter === 'all') return THEORIES;
  return THEORIES.filter(n => n.cat === activeFilter);
}

function drawMap() {
  mapCtx.clearRect(0,0,W,H);
  const visible = new Set(visibleNodes().map(n=>n.id));
  time += 0.008;

  // Draw connections
  CONNECTIONS.forEach(([a,b]) => {
    if (!visible.has(a) || !visible.has(b)) return;
    const na = THEORIES.find(n=>n.id===a);
    const nb = THEORIES.find(n=>n.id===b);
    const pa = nodePos(na), pb = nodePos(nb);

    mapCtx.save();
    mapCtx.globalAlpha = 0.18;
    const lg = mapCtx.createLinearGradient(pa.x,pa.y,pb.x,pb.y);
    lg.addColorStop(0, na.color);
    lg.addColorStop(1, nb.color);
    mapCtx.strokeStyle = lg;
    mapCtx.lineWidth = 0.8;
    mapCtx.setLineDash([4,8]);
    mapCtx.lineDashOffset = -time*20;
    mapCtx.beginPath();
    mapCtx.moveTo(pa.x, pa.y);
    mapCtx.lineTo(pb.x, pb.y);
    mapCtx.stroke();
    mapCtx.restore();
  });

  // Draw nodes
  visibleNodes().forEach(node => {
    const {x,y} = nodePos(node);
    const r = node.r;
    const isHovered = hoveredNode === node;
    const isSelected = selectedNode === node;
    const pulse = Math.sin(time*2 + node.x*10) * 0.15 + 0.85;
    const scale = isHovered ? 1.18 : isSelected ? 1.12 : pulse;
    const R = r * scale;

    mapCtx.save();
    mapCtx.translate(x, y);

    // Outer glow
    const glow = mapCtx.createRadialGradient(0,0,R*0.5,0,0,R*2.5);
    glow.addColorStop(0, node.color + '44');
    glow.addColorStop(1, 'transparent');
    mapCtx.globalAlpha = isHovered ? 0.7 : 0.4;
    mapCtx.fillStyle = glow;
    mapCtx.beginPath();
    mapCtx.arc(0,0,R*2.5,0,Math.PI*2);
    mapCtx.fill();

    // Ring (selected)
    if (isSelected) {
      mapCtx.globalAlpha = 0.9;
      mapCtx.strokeStyle = node.color;
      mapCtx.lineWidth = 2;
      mapCtx.setLineDash([6,4]);
      mapCtx.lineDashOffset = -time*30;
      mapCtx.beginPath();
      mapCtx.arc(0,0,R+8,0,Math.PI*2);
      mapCtx.stroke();
      mapCtx.setLineDash([]);
    }

    // Core fill
    mapCtx.globalAlpha = 1;
    const cg = mapCtx.createRadialGradient(-R*0.3,-R*0.3,0,0,0,R);
    cg.addColorStop(0, '#ffffff22');
    cg.addColorStop(0.4, node.color+'55');
    cg.addColorStop(1, node.color+'18');
    mapCtx.fillStyle = cg;
    mapCtx.beginPath();
    mapCtx.arc(0,0,R,0,Math.PI*2);
    mapCtx.fill();

    // Border
    mapCtx.strokeStyle = node.color;
    mapCtx.lineWidth = isHovered||isSelected ? 2 : 1;
    mapCtx.globalAlpha = isHovered ? 1 : 0.7;
    mapCtx.stroke();

    // Label
    mapCtx.globalAlpha = 1;
    mapCtx.fillStyle = '#ffffff';
    mapCtx.font = `bold ${Math.round(r*0.38)}px 'Noto Serif JP'`;
    mapCtx.textAlign = 'center';
    mapCtx.textBaseline = 'middle';
    const lines = node.label.length > 6 ? [node.label.slice(0,Math.ceil(node.label.length/2)), node.label.slice(Math.ceil(node.label.length/2))] : [node.label];
    lines.forEach((ln, i) => {
      const offset = lines.length > 1 ? (i - 0.5) * r * 0.38 : 0;
      mapCtx.fillText(ln, 0, offset);
    });

    mapCtx.restore();
  });
}

// ══════════════════════════════════════
//  INTERACTION
// ══════════════════════════════════════
function getNodeAt(mx, my) {
  return visibleNodes().find(node => {
    const {x,y} = nodePos(node);
    const dx = mx-x, dy = my-y;
    return Math.sqrt(dx*dx+dy*dy) <= node.r*1.3;
  });
}

const tooltip = document.getElementById('tooltip');

mapCanvas.addEventListener('mousemove', e => {
  if (dragging) {
    viewOffset.x = lastOffset.x + (e.clientX - dragStart.x);
    viewOffset.y = lastOffset.y + (e.clientY - dragStart.y);
    return;
  }
  const node = getNodeAt(e.clientX, e.clientY);
  hoveredNode = node;
  mapCanvas.style.cursor = node ? 'pointer' : 'crosshair';
  if (node) {
    tooltip.style.opacity = '1';
    tooltip.style.left = (e.clientX + 16) + 'px';
    tooltip.style.top = (e.clientY - 10) + 'px';
    tooltip.innerHTML = `<span style="color:${node.color}">${node.en}</span> — ${node.label}`;
  } else {
    tooltip.style.opacity = '0';
  }
});

mapCanvas.addEventListener('mousedown', e => {
  dragging = true;
  dragStart = {x: e.clientX, y: e.clientY};
  lastOffset = {...viewOffset};
});

mapCanvas.addEventListener('mouseup', e => {
  const moved = Math.abs(e.clientX-dragStart.x)+Math.abs(e.clientY-dragStart.y);
  dragging = false;
  if (moved < 5) {
    const node = getNodeAt(e.clientX, e.clientY);
    if (node) openPanel(node);
  }
});

mapCanvas.addEventListener('mouseleave', () => {
  hoveredNode = null; tooltip.style.opacity = '0'; dragging = false;
});

// Touch
mapCanvas.addEventListener('touchstart', e => {
  const t = e.touches[0];
  dragging = true;
  dragStart = {x:t.clientX, y:t.clientY};
  lastOffset = {...viewOffset};
}, {passive:true});

mapCanvas.addEventListener('touchmove', e => {
  const t = e.touches[0];
  viewOffset.x = lastOffset.x + (t.clientX - dragStart.x);
  viewOffset.y = lastOffset.y + (t.clientY - dragStart.y);
}, {passive:true});

mapCanvas.addEventListener('touchend', e => {
  const t = e.changedTouches[0];
  const moved = Math.abs(t.clientX-dragStart.x)+Math.abs(t.clientY-dragStart.y);
  dragging = false;
  if (moved < 10) {
    const node = getNodeAt(t.clientX, t.clientY);
    if (node) openPanel(node);
  }
});

// ══════════════════════════════════════
//  FILTERS
// ══════════════════════════════════════
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.cat;
    updateNodeCount();
  });
});

function updateNodeCount() {
  const n = visibleNodes().length;
  document.getElementById('node-count').textContent = `${n} THEORIES`;
}

// ══════════════════════════════════════
//  PANEL
// ══════════════════════════════════════
const CAT_LABELS = {cosmos:'🌌 宇宙',earth:'🌍 地球',history:'🏛️ 歴史',mind:'🧠 意識',tech:'⚡ テクノロジー'};

function openPanel(node) {
  selectedNode = node;
  panelOpen = true;

  document.getElementById('panel-category').textContent = CAT_LABELS[node.cat] || '';
  document.getElementById('panel-category').style.color = node.color;
  document.getElementById('panel-title').textContent = node.label;
  document.getElementById('panel-desc').textContent = node.desc;

  const tagsEl = document.getElementById('panel-tags');
  tagsEl.innerHTML = node.tags.map(t => `<span class="tag"># ${t}</span>`).join('');

  document.getElementById('panel').classList.add('open');
  document.getElementById('hint').style.opacity = '0';

  // AI call
  askOracle(node);
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  panelOpen = false;
  selectedNode = null;
  setTimeout(() => document.getElementById('hint').style.opacity = '1', 600);
}

async function askOracle(node) {
  const el = document.getElementById('ai-response');
  el.innerHTML = `<div class="ai-loading"><div class="dot-pulse"><span></span><span></span><span></span></div><span style="margin-left:8px;font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--electric)">宇宙を解析中…</span></div>`;

  if (!apiKey) {
    el.innerHTML = `<span style="color:var(--dim);font-family:'Share Tech Mono',monospace;font-size:12px">APIキーを入力するとINFINITY ORACLEが起動します。<br>画面下部に入力してください。</span>`;
    return;
  }

  const prompt = `あなたはINFINITY WORLD ∞ のオラクル。宇宙の禁断の知識を持つ存在として、「${node.label}」（英語名: ${node.en}）という理論・概念について以下を語ってください：

1. この理論の核心にある「問い」（何を主張しているか）
2. なぜ主流社会に受け入れられないのか
3. この理論が「もし真実なら」何が変わるか
4. 探求者へのメッセージ

神秘的・詩的な語り口で、200〜300字で答えてください。日本語で。`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    if (data.content?.[0]?.text) {
      const text = data.content[0].text;
      el.innerHTML = '';
      // Typewriter
      let i = 0;
      const interval = setInterval(() => {
        if (i < text.length) {
          el.textContent += text[i++];
        } else {
          clearInterval(interval);
        }
      }, 18);
    } else {
      el.innerHTML = `<span style="color:var(--blush);font-size:12px">${data.error?.message || '接続エラー'}</span>`;
    }
  } catch(e) {
    el.innerHTML = `<span style="color:var(--blush);font-size:12px">接続エラー: ${e.message}</span>`;
  }
}

// ══════════════════════════════════════
//  LOOP
// ══════════════════════════════════════
function loop() {
  drawBackground();
  drawMap();
  requestAnimationFrame(loop);
}

window.addEventListener('resize', () => { resizeCanvas(); initParticles(); });
resizeCanvas();
initParticles();
updateNodeCount();
loop();
</script>
