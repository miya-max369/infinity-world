<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INFINITY ∞ WORLD — フリンジ理論マップ</title>
<style>
:root {
  --void: #02040a;
  --electric: #00d4ff;
  --plasma: #bf00ff;
  --gold: #ffd060;
  --jade: #00ffaa;
  --rose: #ff6eb4;
  --sky: #7dd3fc;
  --lavender: #c4b5fd;
  --pale: #e0eeff;
  --white: #f0f4ff;
  --dim: #2a3a6a;
  --panel: rgba(3,8,22,0.97);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:var(--void);color:var(--white);font-family:serif;overflow:hidden;cursor:crosshair;}

#bg{position:fixed;inset:0;z-index:0;}
#map{position:fixed;inset:0;z-index:1;}

/* HEADER */
#hdr{
  position:fixed;top:0;left:0;right:0;z-index:10;
  padding:14px 20px 10px;
  background:linear-gradient(to bottom,rgba(2,4,10,.95),transparent);
  display:flex;align-items:center;justify-content:space-between;
  pointer-events:none;
}
.logo-main{
  font-family:monospace;font-size:clamp(11px,2vw,15px);letter-spacing:4px;
  background:linear-gradient(90deg,var(--gold),var(--electric),var(--lavender));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  font-weight:700;
}
.logo-sub{font-family:monospace;font-size:9px;letter-spacing:4px;color:var(--sky);margin-top:3px;}

/* FILTERS */
#filters{
  position:fixed;top:64px;left:50%;transform:translateX(-50%);
  z-index:10;display:flex;gap:6px;flex-wrap:wrap;justify-content:center;padding:0 16px;
}
.fb{
  font-family:monospace;font-size:10px;letter-spacing:2px;
  padding:5px 12px;border:1px solid;background:rgba(2,4,10,.85);
  cursor:pointer;transition:all .2s;text-transform:uppercase;
}
.fb[data-c="all"]    {border-color:var(--pale);   color:var(--pale);}
.fb[data-c="cosmos"] {border-color:var(--sky);    color:var(--sky);}
.fb[data-c="earth"]  {border-color:var(--jade);   color:var(--jade);}
.fb[data-c="history"]{border-color:var(--gold);   color:var(--gold);}
.fb[data-c="mind"]   {border-color:var(--lavender);color:var(--lavender);}
.fb[data-c="tech"]   {border-color:var(--rose);   color:var(--rose);}
.fb.active,.fb:hover{background:rgba(255,255,255,.1);transform:translateY(-1px);}

/* NODE COUNT */
#nc{position:fixed;top:64px;right:16px;z-index:10;font-family:monospace;font-size:9px;letter-spacing:2px;color:var(--dim);}

/* TOOLTIP */
#tip{
  position:fixed;z-index:15;pointer-events:none;
  background:rgba(3,8,22,.95);border:1px solid rgba(0,212,255,.35);
  padding:8px 14px;font-family:monospace;font-size:11px;letter-spacing:1px;
  white-space:nowrap;opacity:0;transition:opacity .15s;color:var(--pale);
}

/* HINT */
#hint{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:10;
  font-family:monospace;font-size:10px;letter-spacing:3px;color:var(--dim);
  animation:blink 2.5s infinite;pointer-events:none;white-space:nowrap;
}
@keyframes blink{0%,100%{opacity:.3}50%{opacity:.8}}

/* PANEL */
#panel{
  position:fixed;right:-480px;top:0;bottom:0;width:min(460px,100vw);
  z-index:20;background:var(--panel);border-left:1px solid rgba(0,212,255,.15);
  display:flex;flex-direction:column;transition:right .5s cubic-bezier(.16,1,.3,1);
  backdrop-filter:blur(20px);overflow:hidden;
}
#panel.open{right:0;}

#phdr{padding:20px 24px 16px;border-bottom:1px solid rgba(255,255,255,.06);position:relative;}
#pcat{font-family:monospace;font-size:9px;letter-spacing:4px;margin-bottom:8px;}
#ptitle{font-size:clamp(16px,3vw,22px);font-weight:700;line-height:1.3;color:var(--gold);}
#pclose{
  position:absolute;top:16px;right:16px;width:30px;height:30px;
  border:1px solid var(--dim);background:none;color:var(--sky);
  font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
#pclose:hover{border-color:var(--electric);color:var(--electric);}

#pbody{flex:1;overflow-y:auto;padding:20px 24px;scrollbar-width:thin;scrollbar-color:var(--dim) transparent;}
#pdesc{font-size:14px;line-height:2;color:var(--pale);margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid rgba(255,255,255,.06);}

/* FISHBONE */
#fishbone-section{margin-bottom:20px;}
.fb-label{font-family:monospace;font-size:9px;letter-spacing:4px;color:var(--electric);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.fb-label::after{content:'';flex:1;height:1px;background:rgba(0,212,255,.2);}
.fb-tree{}
.fb-node{
  display:flex;align-items:flex-start;gap:8px;
  margin-bottom:6px;cursor:pointer;padding:8px 12px;
  border:1px solid rgba(255,255,255,.06);
  background:rgba(255,255,255,.02);
  transition:all .2s;position:relative;
}
.fb-node:hover{border-color:var(--sky);background:rgba(125,211,252,.06);}
.fb-node.expanded{border-color:var(--electric);}
.fb-arrow{font-family:monospace;font-size:10px;color:var(--sky);flex-shrink:0;transition:transform .2s;margin-top:2px;}
.fb-node.expanded .fb-arrow{transform:rotate(90deg);}
.fb-node-text{font-size:13px;line-height:1.7;color:var(--pale);flex:1;}
.fb-node-tag{font-family:monospace;font-size:9px;letter-spacing:1px;color:var(--lavender);flex-shrink:0;}
.fb-children{margin-left:20px;border-left:1px solid rgba(0,212,255,.15);padding-left:12px;display:none;}
.fb-children.open{display:block;}
.fb-child{
  font-size:12px;line-height:1.8;color:var(--sky);padding:6px 10px;
  margin-bottom:4px;cursor:pointer;border:1px solid rgba(125,211,252,.1);
  background:rgba(125,211,252,.03);transition:all .2s;
}
.fb-child:hover{border-color:var(--sky);background:rgba(125,211,252,.08);color:var(--white);}
.fb-grandchild{
  font-size:11px;color:var(--lavender);padding:4px 8px;margin:3px 0 3px 16px;
  border-left:2px solid rgba(196,181,253,.2);line-height:1.7;
  cursor:pointer;transition:color .2s;
}
.fb-grandchild:hover{color:var(--white);}

/* VERDICT */
#verdict-box{
  background:linear-gradient(135deg,rgba(0,212,255,.06),rgba(191,0,255,.04));
  border:1px solid rgba(0,212,255,.2);padding:16px 20px;margin-bottom:20px;
}
.v-label{font-family:monospace;font-size:9px;letter-spacing:3px;color:var(--electric);margin-bottom:8px;}
.v-score{font-family:monospace;font-size:36px;font-weight:700;color:var(--gold);line-height:1;}
.v-score span{font-size:14px;color:var(--sky);}
.v-text{font-size:13px;color:var(--pale);margin-top:8px;line-height:1.7;}

/* TAGS */
#ptags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;}
.ptag{font-family:monospace;font-size:9px;letter-spacing:1px;padding:4px 10px;border:1px solid rgba(255,255,255,.1);color:var(--sky);}

/* SHARE */
#share-section{padding-top:16px;border-top:1px solid rgba(255,255,255,.06);}
.share-label{font-family:monospace;font-size:9px;letter-spacing:4px;color:var(--lavender);margin-bottom:10px;}
.share-btns{display:flex;gap:8px;flex-wrap:wrap;}
.share-btn{
  font-family:monospace;font-size:10px;letter-spacing:2px;padding:8px 16px;
  background:none;cursor:pointer;border:1px solid;transition:all .2s;flex:1;min-width:100px;
  color:var(--pale);
}
.share-btn.img{border-color:var(--gold);color:var(--gold);}
.share-btn.img:hover{background:rgba(255,208,96,.1);}
.share-btn.msg{border-color:var(--lavender);color:var(--lavender);}
.share-btn.msg:hover{background:rgba(196,181,253,.1);}
.share-btn.copy{border-color:var(--sky);color:var(--sky);}
.share-btn.copy:hover{background:rgba(125,211,252,.1);}

/* SHARE TOAST */
#toast{
  position:fixed;bottom:60px;left:50%;transform:translateX(-50%);
  background:rgba(3,8,22,.97);border:1px solid var(--jade);
  padding:10px 24px;font-family:monospace;font-size:11px;letter-spacing:2px;
  color:var(--jade);z-index:100;opacity:0;transition:opacity .3s;pointer-events:none;
  white-space:nowrap;
}
#toast.show{opacity:1;}

/* SHARE CANVAS (hidden) */
#share-canvas{display:none;}
</style>
</head>
<body>

<canvas id="bg"></canvas>
<canvas id="map"></canvas>

<div id="hdr">
  <div>
    <div class="logo-main">INFINITY ∞ WORLD</div>
    <div class="logo-sub">FRINGE THEORY MAP — UNIVERSE EDITION</div>
  </div>
</div>

  <button class="fb" data-c="mind">🧠 意識</button>
  <button class="fb" data-c="tech">⚡ テクノロジー</button>

<div id="nc"></div>
<div id="tip"></div>
<div id="hint">◎ ノードをタップして理論を深掘りする</div>
<div id="toast"></div>
<canvas id="share-canvas"></canvas>

<div id="panel">
  <div id="phdr">
    <div id="pcat"></div>
    <div id="ptitle"></div>
    <button id="pclose" onclick="closePanel()">✕</button>

  <div id="pbody">

    <div id="verdict-box">

      <div class="v-text" id="vtext"></div>
    </div>

    <div id="fishbone-section">

      <div class="fb-tree" id="fb-tree"></div>
    </div>

    <div id="ptags"></div>

    <div id="share-section">
      <div class="share-label">◈ SHARE</div>
      <div class="share-btns">

        <button class="share-btn copy" onclick="copyLink()">🔗 リンクコピー</button>
      </div>
    </div>
  </div>
</div>

  ['flatearth','firmament'],['flatearth','hollow'],['firmament','hollow'],
  ['hollow','anunnaki'],['anunnaki','planet9'],['anunnaki','ancient_tech'],
  ['tartaria','mud_flood'],['tartaria','ancient_tech'],['tartaria','freeenergy'],
  ['katakamuna','kotodama'],['kotodama','akashic'],
  ['simulation','multiverse'],['simulation','akashic'],['simulation','dmt'],
  ['haarp','deepstate'],['freeenergy','deepstate'],['freeenergy','haarp'],
  ['morphic','akashic'],['morphic','kotodama'],

// ════════════════════════════════
// CANVAS BG
// ════════════════════════════════
const bg=document.getElementById('bg'),bgCtx=bg.getContext('2d');
const mp=document.getElementById('map'),mpCtx=mp.getContext('2d');
let W,H,bgT=0,stars=[];

function resize(){
  W=bg.width=mp.width=window.innerWidth;
  H=bg.height=mp.height=window.innerHeight;
  stars=Array.from({length:180},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.5+.2,a:Math.random()*.7+.1,ph:Math.random()*Math.PI*2,sp:Math.random()*.015+.004}));
}

function drawBg(){
  bgCtx.clearRect(0,0,W,H);bgT+=.006;
  const g=bgCtx.createRadialGradient(W*.5,H*.45,0,W*.5,H*.5,Math.max(W,H)*.75);
  g.addColorStop(0,'#06102a');g.addColorStop(.5,'#03060f');g.addColorStop(1,'#02040a');
  bgCtx.fillStyle=g;bgCtx.fillRect(0,0,W,H);
  [[.2,.3,220,.07],[.75,.6,270,.05],[.5,.85,180,.04]].forEach(([nx,ny,h,a])=>{
    const ng=bgCtx.createRadialGradient(W*nx,H*ny,0,W*nx,H*ny,Math.min(W,H)*.3);
    ng.addColorStop(0,`hsla(${h},90%,55%,${a})`);ng.addColorStop(1,'transparent');
    bgCtx.fillStyle=ng;bgCtx.fillRect(0,0,W,H);
  });
  bgCtx.save();bgCtx.globalAlpha=.035;bgCtx.strokeStyle='#00d4ff';bgCtx.lineWidth=.5;
  const gs=70;
  for(let x=0;x<W;x+=gs){bgCtx.beginPath();bgCtx.moveTo(x,0);bgCtx.lineTo(x,H);bgCtx.stroke();}
  for(let y=0;y<H;y+=gs){bgCtx.beginPath();bgCtx.moveTo(0,y);bgCtx.lineTo(W,y);bgCtx.stroke();}
  bgCtx.restore();
  stars.forEach(s=>{
    const tw=.35+.65*Math.sin(bgT/s.sp*s.sp*8+s.ph);
    bgCtx.beginPath();bgCtx.arc(s.x,s.y,s.r,0,Math.PI*2);
    bgCtx.fillStyle=`rgba(200,220,255,${s.a*tw})`;bgCtx.fill();
  });
}

// ════════════════════════════════
// STATE
// ════════════════════════════════
let activeFilter='all',selectedNode=null,hoveredNode=null;
let dragging=false,dragStart={x:0,y:0},viewOffset={x:0,y:0},lastOffset={x:0,y:0};
let mapT=0;

function nodePos(n){return{x:n.x*W+viewOffset.x,y:n.y*H+viewOffset.y};}
function visible(){return activeFilter==='all'?THEORIES:THEORIES.filter(n=>n.cat===activeFilter);}

// ════════════════════════════════
// DRAW MAP
// ════════════════════════════════
function drawMap(){
  mpCtx.clearRect(0,0,W,H);mapT+=.008;
  const vis=new Set(visible().map(n=>n.id));
  CONNECTIONS.forEach(([a,b])=>{
    if(!vis.has(a)||!vis.has(b))return;
    const na=THEORIES.find(n=>n.id===a),nb=THEORIES.find(n=>n.id===b);
    const pa=nodePos(na),pb=nodePos(nb);
    mpCtx.save();mpCtx.globalAlpha=.15;
    const lg=mpCtx.createLinearGradient(pa.x,pa.y,pb.x,pb.y);
    lg.addColorStop(0,na.color);lg.addColorStop(1,nb.color);
    mpCtx.strokeStyle=lg;mpCtx.lineWidth=.8;
    mpCtx.setLineDash([4,8]);mpCtx.lineDashOffset=-mapT*20;
    mpCtx.beginPath();mpCtx.moveTo(pa.x,pa.y);mpCtx.lineTo(pb.x,pb.y);mpCtx.stroke();
    mpCtx.restore();
  });
  visible().forEach(node=>{
    const {x,y}=nodePos(node);
    const isH=hoveredNode===node,isS=selectedNode===node;
    const pulse=Math.sin(mapT*2+node.x*10)*.15+.85;
    const R=node.r*(isH?1.18:isS?1.12:pulse);
    mpCtx.save();mpCtx.translate(x,y);
    const glow=mpCtx.createRadialGradient(0,0,R*.5,0,0,R*2.5);
    glow.addColorStop(0,node.color+'44');glow.addColorStop(1,'transparent');
    mpCtx.globalAlpha=isH?.7:.4;mpCtx.fillStyle=glow;
    mpCtx.beginPath();mpCtx.arc(0,0,R*2.5,0,Math.PI*2);mpCtx.fill();
    if(isS){
      mpCtx.globalAlpha=.9;mpCtx.strokeStyle=node.color;mpCtx.lineWidth=2;
      mpCtx.setLineDash([6,4]);mpCtx.lineDashOffset=-mapT*30;
      mpCtx.beginPath();mpCtx.arc(0,0,R+8,0,Math.PI*2);mpCtx.stroke();mpCtx.setLineDash([]);
    }
    mpCtx.globalAlpha=1;
    const cg=mpCtx.createRadialGradient(-R*.3,-R*.3,0,0,0,R);
    cg.addColorStop(0,'#ffffff22');cg.addColorStop(.4,node.color+'55');cg.addColorStop(1,node.color+'18');
    mpCtx.fillStyle=cg;mpCtx.beginPath();mpCtx.arc(0,0,R,0,Math.PI*2);mpCtx.fill();
    mpCtx.strokeStyle=node.color;mpCtx.lineWidth=isH||isS?2:1;mpCtx.globalAlpha=isH?1:.7;mpCtx.stroke();
    mpCtx.globalAlpha=1;mpCtx.fillStyle='#f0f4ff';
    mpCtx.font=`bold ${Math.round(node.r*.38)}px serif`;
    mpCtx.textAlign='center';mpCtx.textBaseline='middle';
    const lbl=node.label;
    const lines=lbl.length>6?[lbl.slice(0,Math.ceil(lbl.length/2)),lbl.slice(Math.ceil(lbl.length/2))]:[lbl];
    lines.forEach((ln,i)=>{
      const off=lines.length>1?(i-.5)*node.r*.38:0;
      mpCtx.fillText(ln,0,off);
    });
    mpCtx.restore();
  });
}

// ════════════════════════════════
// INTERACTION
// ════════════════════════════════
function getNodeAt(mx,my){
  return visible().find(n=>{const p=nodePos(n);const dx=mx-p.x,dy=my-p.y;return Math.sqrt(dx*dx+dy*dy)<=n.r*1.4;});
}

const tip=document.getElementById('tip');
mp.addEventListener('mousemove',e=>{
  if(dragging){viewOffset.x=lastOffset.x+(e.clientX-dragStart.x);viewOffset.y=lastOffset.y+(e.clientY-dragStart.y);return;}
  const n=getNodeAt(e.clientX,e.clientY);hoveredNode=n;mp.style.cursor=n?'pointer':'crosshair';
  if(n){tip.style.opacity='1';tip.style.left=(e.clientX+14)+'px';tip.style.top=(e.clientY-10)+'px';tip.innerHTML=`<span style="color:${n.color}">${n.en}</span> — ${n.label}`;}
  else tip.style.opacity='0';
});
mp.addEventListener('mousedown',e=>{dragging=true;dragStart={x:e.clientX,y:e.clientY};lastOffset={...viewOffset};});
mp.addEventListener('mouseup',e=>{
  const moved=Math.abs(e.clientX-dragStart.x)+Math.abs(e.clientY-dragStart.y);
  dragging=false;
  if(moved<5){const n=getNodeAt(e.clientX,e.clientY);if(n)openPanel(n);}
});
mp.addEventListener('mouseleave',()=>{hoveredNode=null;tip.style.opacity='0';dragging=false;});
mp.addEventListener('touchstart',e=>{const t=e.touches[0];dragging=true;dragStart={x:t.clientX,y:t.clientY};lastOffset={...viewOffset};},{passive:true});
mp.addEventListener('touchmove',e=>{const t=e.touches[0];viewOffset.x=lastOffset.x+(t.clientX-dragStart.x);viewOffset.y=lastOffset.y+(t.clientY-dragStart.y);},{passive:true});
mp.addEventListener('touchend',e=>{
  const t=e.changedTouches[0];
  const moved=Math.abs(t.clientX-dragStart.x)+Math.abs(t.clientY-dragStart.y);
  dragging=false;if(moved<12){const n=getNodeAt(t.clientX,t.clientY);if(n)openPanel(n);}
});

document.querySelectorAll('.fb[data-c]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.fb[data-c]').forEach(b=>b.classList.remove('active'));

});
function updateCount(){document.getElementById('nc').textContent=visible().length+' THEORIES';}

// ════════════════════════════════
// PANEL
// ════════════════════════════════
const CAT={cosmos:'🌌 宇宙',earth:'🌍 地球',history:'🏛️ 歴史',mind:'🧠 意識',tech:'⚡ テクノロジー'};

function openPanel(node){
  selectedNode=node;
  document.getElementById('pcat').textContent=CAT[node.cat]||'';
  document.getElementById('pcat').style.color=node.color;
  document.getElementById('ptitle').textContent=node.label;
  document.getElementById('pdesc').textContent=node.desc;

  // FRINGE INDEX
  const sc=document.getElementById('vscore');
  const vt=document.getElementById('vtext');
  let n=0;const tick=setInterval(()=>{n=Math.min(n+2,node.score);sc.innerHTML=`${n}<span>/100</span>`;if(n>=node.score)clearInterval(tick);},18);
  sc.style.color=node.score>=75?'#ffd060':node.score>=55?'#7dd3fc':'#c4b5fd';
  vt.textContent=node.verdict;vt.style.color='#e0eeff';

  // FISHBONE
  const tree=document.getElementById('fb-tree');
  tree.innerHTML='';
  (node.fishbone||[]).forEach((branch,i)=>{
    const nodeEl=document.createElement('div');
    nodeEl.className='fb-node';
    nodeEl.innerHTML=`<span class="fb-arrow">▶</span><span class="fb-node-text">${branch.q}</span><span class="fb-node-tag">Q${i+1}</span>`;
    const children=document.createElement('div');
    children.className='fb-children';
    children.innerHTML=`<div class="fb-child" style="color:#e0eeff;border-color:rgba(0,212,255,.15);background:rgba(0,212,255,.03);cursor:default;">${branch.a}</div>`;
    (branch.subs||[]).forEach(sub=>{
      const gc=document.createElement('div');gc.className='fb-grandchild';gc.textContent='◈ '+sub;
      gc.onclick=()=>{
        const related=THEORIES.find(t=>t.label===sub||t.en.toLowerCase()===sub.toLowerCase());
        if(related){closePanel();setTimeout(()=>openPanel(related),300);}
      };
      children.appendChild(gc);
    });
    nodeEl.onclick=()=>{nodeEl.classList.toggle('expanded');children.classList.toggle('open');};
    tree.appendChild(nodeEl);tree.appendChild(children);
  });

  // TAGS
  const tagsEl=document.getElementById('ptags');
  tagsEl.innerHTML=(node.tags||[]).map(t=>`<span class="ptag"># ${t}</span>`).join('');

  document.getElementById('panel').classList.add('open');
  document.getElementById('hint').style.opacity='0';
}

function closePanel(){
  document.getElementById('panel').classList.remove('open');
  selectedNode=null;
  setTimeout(()=>document.getElementById('hint').style.opacity='1',600);
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function shareImage(){
  if(!selectedNode){showToast('理論を選択してください');return;}
  const n=selectedNode;
  const c=document.getElementById('share-canvas');

  const g=ctx.createLinearGradient(0,0,800,450);g.addColorStop(0,'#02040a');g.addColorStop(1,'#060c20');
  ctx.fillStyle=g;ctx.fillRect(0,0,800,450);
  // Border
  ctx.strokeStyle=n.color;ctx.lineWidth=2;ctx.strokeRect(12,12,776,426);
  // Logo
  ctx.font='bold 13px monospace';ctx.fillStyle='#7dd3fc';ctx.textAlign='left';
  ctx.fillText('INFINITY ∞ WORLD — FRINGE THEORY MAP',30,42);
  // Score bar
  const sw=Math.round((n.score/100)*740);
  ctx.fillStyle='rgba(255,255,255,.06)';ctx.fillRect(30,60,740,6);
  ctx.fillStyle=n.color;ctx.fillRect(30,60,sw,6);
  // Title
  ctx.font='bold 52px serif';ctx.fillStyle=n.color;ctx.textAlign='center';
  ctx.fillText(n.label,400,130);
  // EN
  ctx.font='14px monospace';ctx.fillStyle='#7dd3fc';ctx.fillText(n.en,400,155);
  // Score
  ctx.font='bold 48px monospace';ctx.fillStyle='#ffd060';ctx.fillText(n.score,400,220);
  ctx.font='16px monospace';ctx.fillStyle='#7dd3fc';ctx.fillText('FRINGE INDEX / 100',400,245);
  // Desc
  ctx.font='15px serif';ctx.fillStyle='#e0eeff';ctx.textAlign='left';
  const words=n.desc.split('');let line='',y=290;
  words.forEach(ch=>{
    line+=ch;
    if(line.length>=46){ctx.fillText(line,30,y);line='';y+=26;}
  });
  if(line)ctx.fillText(line,30,y);
  // Tags
  ctx.font='11px monospace';ctx.fillStyle=n.color;ctx.textAlign='left';
  ctx.fillText((n.tags||[]).map(t=>'#'+t).join('  '),30,420);

  ctx.font='11px monospace';ctx.fillStyle='#2a3a6a';ctx.textAlign='right';

  const a=document.createElement('a');
  a.href=c.toDataURL('image/png');
  a.download=`infinity_world_${n.id}.png`;
  a.click();
  showToast('📷 画像を保存しました');
}

  const n=selectedNode;

  if(navigator.share){navigator.share({title:`INFINITY ∞ WORLD — ${n.label}`,text:text,url:'https://miya-max369.github.io/infinity-world/'}).catch(()=>{});}
  else{navigator.clipboard.writeText(text).then(()=>showToast('💬 テキストをコピーしました'));}

function copyLink(){
