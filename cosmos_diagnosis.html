<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>コスモス世界観診断</title>
<style>
:root {
  --void: #010208;
  --violet: #6b21e8;
  --lavender: #a78bfa;
  --rose: #f472b6;
  --gold: #fbbf24;
  --white: #eef2ff;
  --dim: #374180;
  --fog: rgba(238,242,255,0.06);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100vh;background:var(--void);color:var(--white);font-family:serif;overflow-x:hidden;}
body{cursor:crosshair;}

#cosmos-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
.page{position:relative;z-index:2;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0 20px 100px;}

/* HEADER */
header{width:100%;max-width:680px;text-align:center;padding:44px 0 32px;border-bottom:1px solid rgba(167,139,250,0.15);margin-bottom:0;}
.logo{font-family:monospace;font-size:10px;letter-spacing:6px;color:var(--dim);margin-bottom:12px;}
.title{font-size:clamp(30px,8vw,68px);font-weight:300;font-style:italic;
  background:linear-gradient(135deg,var(--lavender),var(--rose),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1.1;letter-spacing:2px;}
.subtitle{font-family:monospace;font-size:10px;letter-spacing:4px;color:var(--dim);margin-top:10px;}

/* PROGRESS */
.progress-wrap{width:100%;max-width:600px;margin:36px auto 0;padding:0 4px;display:none;}
.progress-bar-bg{height:2px;background:rgba(107,33,232,0.2);border-radius:1px;overflow:hidden;}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--violet),var(--rose));border-radius:1px;transition:width 0.8s cubic-bezier(0.16,1,0.3,1);width:0%;}
.progress-labels{display:flex;justify-content:space-between;margin-top:8px;font-family:monospace;font-size:9px;letter-spacing:2px;color:var(--dim);}

/* QUESTION CARD */
.q-stage{width:100%;max-width:660px;margin:44px auto 0;}
.q-card{
  background:linear-gradient(135deg,rgba(107,33,232,0.06),rgba(244,114,182,0.04));
  border:1px solid rgba(167,139,250,0.2);padding:44px 36px;
  clip-path:polygon(0 0,calc(100% - 20px) 0,100% 20px,100% 100%,20px 100%,0 calc(100% - 20px));
  animation:card-in 0.5s cubic-bezier(0.16,1,0.3,1) both;
}
@keyframes card-in{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.q-num{font-family:monospace;font-size:10px;letter-spacing:4px;color:var(--violet);margin-bottom:20px;}
.q-symbol{font-size:34px;margin-bottom:16px;display:block;}
.q-text{font-size:clamp(18px,3.5vw,26px);font-style:italic;line-height:1.7;margin-bottom:32px;font-weight:300;}

/* OPTIONS */
.options{display:flex;flex-direction:column;gap:10px;}
.opt{
  padding:16px 22px;background:var(--fog);border:1px solid rgba(167,139,250,0.12);
  cursor:pointer;font-size:14px;line-height:1.7;color:rgba(238,242,255,0.8);
  text-align:left;transition:all 0.2s;width:100%;
}
.opt:hover{border-color:rgba(167,139,250,0.45);color:var(--white);background:rgba(107,33,232,0.08);transform:translateX(3px);}
.opt.selected{border-color:var(--lavender);color:var(--white);background:rgba(107,33,232,0.15);}
.opt-label{font-family:monospace;font-size:9px;letter-spacing:2px;color:var(--violet);display:block;margin-bottom:5px;}

/* NEXT BTN */
.next-wrap{margin-top:28px;text-align:right;}
#next-btn{
  font-style:italic;font-size:17px;letter-spacing:2px;padding:13px 36px;
  background:none;cursor:pointer;border:1px solid rgba(167,139,250,0.4);color:var(--lavender);
  transition:all 0.3s;
  clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px));
}
#next-btn:hover{background:rgba(107,33,232,0.15);border-color:var(--lavender);}
#next-btn:disabled{opacity:0.2;cursor:not-allowed;}

/* API KEY */
.apikey-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:50;
  background:rgba(1,2,8,0.97);border-top:1px solid rgba(107,33,232,0.2);
  padding:10px 20px;display:flex;gap:8px;align-items:center;
}
.apikey-bar label{font-family:monospace;font-size:10px;letter-spacing:3px;color:var(--dim);white-space:nowrap;}
.apikey-bar input{flex:1;background:rgba(107,33,232,0.05);border:1px solid var(--dim);
  color:var(--white);font-family:monospace;font-size:11px;padding:7px 10px;outline:none;}
.apikey-bar input:focus{border-color:var(--violet);}
.apikey-bar input::placeholder{color:var(--dim);}
.apikey-bar button{font-family:monospace;font-size:10px;letter-spacing:2px;
  padding:7px 14px;background:none;border:1px solid var(--violet);color:var(--violet);cursor:pointer;white-space:nowrap;}
.apikey-bar button:hover{background:rgba(107,33,232,0.15);}

/* LOADING */
#loading{display:none;position:fixed;inset:0;z-index:100;background:rgba(1,2,8,0.95);
  align-items:center;justify-content:center;flex-direction:column;gap:28px;}
#loading.active{display:flex;}
.load-orb{width:90px;height:90px;position:relative;}
.load-orb::before,.load-orb::after{content:'';position:absolute;border-radius:50%;border:1px solid transparent;}
.load-orb::before{inset:0;border-top-color:var(--lavender);border-right-color:var(--lavender);animation:spin 2s linear infinite;}
.load-orb::after{inset:16px;border-bottom-color:var(--rose);border-left-color:var(--rose);animation:spin 1.3s linear infinite reverse;}
@keyframes spin{to{transform:rotate(360deg)}}
.load-text{font-style:italic;font-size:18px;color:var(--lavender);animation:fp 2s infinite;}
@keyframes fp{0%,100%{opacity:0.4}50%{opacity:1}}
.load-sub{font-family:monospace;font-size:10px;letter-spacing:3px;color:var(--dim);}

/* RESULT */
#result{display:none;width:100%;max-width:680px;margin-top:44px;animation:card-in 0.8s ease both;}
.result-sigil{text-align:center;margin-bottom:36px;}
.sigil-symbol{font-size:64px;display:block;margin-bottom:14px;animation:float 4s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.type-label{font-family:monospace;font-size:10px;letter-spacing:5px;color:var(--violet);margin-bottom:10px;}
.type-name{font-size:clamp(28px,6vw,52px);font-style:italic;font-weight:300;
  background:linear-gradient(135deg,var(--lavender),var(--rose),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15;margin-bottom:12px;}
.type-en{font-family:monospace;font-size:10px;letter-spacing:4px;color:var(--dim);}

.divider{height:1px;background:linear-gradient(90deg,transparent,rgba(167,139,250,0.4),transparent);margin:32px 0;position:relative;}
.divider::before{content:'◈';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);background:var(--void);padding:0 10px;color:var(--violet);font-size:11px;}

.rs-label{font-family:monospace;font-size:9px;letter-spacing:4px;color:var(--violet);margin-bottom:12px;}
.essence-box{
  background:linear-gradient(135deg,rgba(107,33,232,0.08),rgba(244,114,182,0.05));
  border:1px solid rgba(167,139,250,0.2);padding:26px 28px;
  font-style:italic;font-size:17px;line-height:2;color:rgba(238,242,255,0.9);margin-bottom:24px;
}
.mission-box{
  border:1px solid rgba(251,191,36,0.25);padding:26px 28px;
  background:rgba(251,191,36,0.04);font-size:14px;line-height:2;
  color:rgba(238,242,255,0.82);margin-bottom:24px;
}
.traits-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px;}
@media(max-width:480px){.traits-grid{grid-template-columns:1fr;}}
.trait-pill{padding:12px 16px;border:1px solid rgba(167,139,250,0.15);font-size:13px;line-height:1.6;color:rgba(238,242,255,0.7);background:var(--fog);}
.trait-key{display:block;color:var(--lavender);font-size:10px;letter-spacing:1px;margin-bottom:4px;font-family:monospace;}
.affinity-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:36px;}
.affinity-tag{font-family:monospace;font-size:10px;letter-spacing:1px;padding:5px 12px;border:1px solid rgba(167,139,250,0.2);color:rgba(238,242,255,0.45);}
.restart-btn{display:block;width:100%;padding:18px;font-style:italic;font-size:18px;letter-spacing:2px;
  background:none;cursor:pointer;border:1px solid rgba(167,139,250,0.3);color:var(--lavender);transition:all 0.3s;text-align:center;}
.restart-btn:hover{background:rgba(107,33,232,0.1);border-color:var(--lavender);}
</style>
</head>
<body>

<canvas id="cosmos-canvas"></canvas>

<div id="loading">
  <div class="load-orb"></div>
  <div class="load-text">宇宙があなたを読み解いている…</div>
  <div class="load-sub">DECODING YOUR COSMIC ARCHETYPE</div>
</div>

<div class="page">
  <header>
    <div class="logo">INFINITY WORLD ∞</div>
    <div class="title">コスモス<br>世界観診断</div>
    <div class="subtitle">COSMOS WORLDVIEW DIAGNOSIS</div>
  </header>

  <div class="apikey-bar">
    <label>API KEY</label>
    <input id="apikey" type="password" placeholder="sk-ant-... (結果の個人化に必要)">
    <button onclick="saveKey()">CONNECT</button>
  </div>

  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="prog-fill"></div></div>
    <div class="progress-labels"><span id="prog-cur">問い 1</span><span id="prog-tot"></span></div>
  </div>

  <div class="q-stage" id="q-stage"></div>
  <div id="result"></div>
</div>

<script>
// ── CANVAS ──
const cv=document.getElementById('cosmos-canvas');
const ctx=cv.getContext('2d');
let CW,CH,cosT=0,stars=[],cosmosH=260;

function resizeCv(){
  CW=cv.width=window.innerWidth;CH=cv.height=window.innerHeight;
  stars=Array.from({length:160},()=>({x:Math.random()*CW,y:Math.random()*CH,r:Math.random()*1.4+.2,a:Math.random()*.7+.1,ph:Math.random()*Math.PI*2,sp:Math.random()*.02+.005}));
}

function drawCosmos(){
  ctx.clearRect(0,0,CW,CH);cosT+=.008;
  const bg=ctx.createRadialGradient(CW*.5,CH*.4,0,CW*.5,CH*.5,Math.max(CW,CH)*.8);
  bg.addColorStop(0,`hsl(${cosmosH},70%,10%)`);bg.addColorStop(.6,`hsl(${cosmosH+20},50%,4%)`);bg.addColorStop(1,'#010208');
  ctx.fillStyle=bg;ctx.fillRect(0,0,CW,CH);
  const ng=ctx.createRadialGradient(CW*.5,CH*.3,0,CW*.5,CH*.3,Math.min(CW,CH)*.4);
  ng.addColorStop(0,`hsla(${cosmosH},80%,60%,.045)`);ng.addColorStop(1,'transparent');
  ctx.fillStyle=ng;ctx.fillRect(0,0,CW,CH);
  stars.forEach(s=>{const tw=.4+.6*Math.sin(cosT*s.sp*10+s.ph);ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(238,242,255,${s.a*tw})`;ctx.fill();});
  requestAnimationFrame(drawCosmos);
}
window.addEventListener('resize',resizeCv);resizeCv();drawCosmos();

// ── DATA ──
const QUESTIONS=[
  {num:'I',symbol:'🌌',hue:240,text:'夜空を見上げたとき、心に最初に浮かぶのは？',opts:[
    {label:'A',text:'星の数だけ別の世界がある——私はそのどこかから来た気がする',score:{cosmos:3,ancient:1}},
    {label:'B',text:'この宇宙全体が誰かのシミュレーションだとしたら、出口はどこだ',score:{seeker:3,tech:1}},
    {label:'C',text:'古代の人々はなぜこれほど正確に星を知っていたのか',score:{ancient:3,shadow:1}},
    {label:'D',text:'光の速さで進んでも宇宙の端に辿り着けないという恐怖と快感',score:{void:3,cosmos:1}},
  ]},
  {num:'II',symbol:'🌍',hue:160,text:'「地球の本当の姿」について、最も引かれる考えは？',opts:[
    {label:'A',text:'内部に空洞があり、別の文明が存在している',score:{earth:3,ancient:1}},
    {label:'B',text:'覆われた天蓋の下に私たちは閉じ込められている',score:{shadow:3,earth:1}},
    {label:'C',text:'地球自体が意識を持つ生命体だということの方が重要',score:{mind:3,cosmos:1}},
    {label:'D',text:'どんな形であれ、支配層が隠しているという事実こそが真実',score:{shadow:3,seeker:1}},
  ]},
  {num:'III',symbol:'👁️',hue:280,text:'あなたが「真実」に近づくとき、最も頼りにするのは？',opts:[
    {label:'A',text:'体の奥から来る直感——言葉になる前の「知っている感覚」',score:{mind:3,cosmos:1}},
    {label:'B',text:'古い文献、失われた言語、隠された地図の中のパターン',score:{ancient:3,seeker:1}},
    {label:'C',text:'主流が「あり得ない」と言うものの中に必ず何かある',score:{shadow:3,void:1}},
    {label:'D',text:'夢、瞑想、意識の境界での体験',score:{mind:3,void:1}},
  ]},
  {num:'IV',symbol:'⚡',hue:45,text:'現代文明が隠蔽していると思うものは？',opts:[
    {label:'A',text:'フリーエネルギー技術——すでに完成しているが石油利権が潰している',score:{shadow:3,tech:1}},
    {label:'B',text:'人類の本当の起源——私たちは「作られた」存在かもしれない',score:{ancient:3,cosmos:1}},
    {label:'C',text:'意識の力——思考が物理現実を変えることができるという真実',score:{mind:3,seeker:1}},
    {label:'D',text:'地球外知的生命体との過去の交流——証拠はすでに存在する',score:{cosmos:3,shadow:1}},
  ]},
  {num:'V',symbol:'🔮',hue:320,text:'世界の「全ての真実」が明らかになったら、あなたは何をする？',opts:[
    {label:'A',text:'一人で深く考え、自分だけの解釈を構築する',score:{void:3,seeker:1}},
    {label:'B',text:'知る必要がある人々に伝え、目覚めを促す',score:{shadow:3,mind:1}},
    {label:'C',text:'失われた古代の知恵と照合し、循環する歴史を解読する',score:{ancient:3,cosmos:1}},
    {label:'D',text:'次の次元への扉を見つけ、越えていく',score:{cosmos:3,void:1}},
  ]},
  {num:'VI',symbol:'🌀',hue:200,text:'あなたにとって「言葉」とは？',opts:[
    {label:'A',text:'宇宙の振動数を記号化したもの——言葉は現実を創る力を持つ',score:{mind:3,ancient:1}},
    {label:'B',text:'情報を圧縮・伝達するツール——精度が命',score:{tech:3,seeker:1}},
    {label:'C',text:'かつての人類が宇宙と交信するために使った周波数の残骸',score:{ancient:3,cosmos:1}},
    {label:'D',text:'言葉の「隙間」に真実が隠れている',score:{void:3,shadow:1}},
  ]},
  {num:'VII',symbol:'✦',hue:60,text:'あなたが存在する本当の理由は、何だと感じるか？',opts:[
    {label:'A',text:'この宇宙の謎を解くために送り込まれた観測者',score:{void:3,cosmos:1}},
    {label:'B',text:'眠っている人々に光を届けるための触媒',score:{mind:3,shadow:1}},
    {label:'C',text:'古代と現代を繋ぐ生きた記憶装置',score:{ancient:3,seeker:1}},
    {label:'D',text:'次の次元の扉を最初に開ける存在',score:{cosmos:3,void:1}},
  ]},
];

const TYPES={
  cosmos: {name:'星界の旅人',  en:'STAR REALM WANDERER',  symbol:'🌠',hue:220},
  ancient:{name:'古代の継承者',en:'ANCIENT INHERITOR',     symbol:'🏛️',hue:45},
  shadow: {name:'闇の暴露者',  en:'SHADOW REVEALER',       symbol:'👁️',hue:0},
  mind:   {name:'意識の開拓者',en:'CONSCIOUSNESS PIONEER', symbol:'🧬',hue:280},
  seeker: {name:'時空の解読者',en:'SPACETIME DECODER',     symbol:'🔭',hue:190},
  void:   {name:'虚無の観測者',en:'VOID OBSERVER',         symbol:'🕳️',hue:250},
  earth:  {name:'地底の賢者',  en:'UNDERWORLD SAGE',       symbol:'🌿',hue:160},
  tech:   {name:'次元の越境者',en:'DIMENSION CROSSER',     symbol:'⚡',hue:170},
};

// ── STATE ──
let apiKey=localStorage.getItem('iw_key')||'';
if(apiKey)document.getElementById('apikey').value=apiKey.slice(0,8)+'••••••••';
function saveKey(){const v=document.getElementById('apikey').value.trim();if(v&&!v.includes('•')){apiKey=v;localStorage.setItem('iw_key',v);document.getElementById('apikey').value=v.slice(0,8)+'••••••••';const b=document.querySelector('.apikey-bar button');b.textContent='✓ OK';setTimeout(()=>b.textContent='CONNECT',2000);}}

let currentQ=-1,scores={},answers=[],selectedOpt=null;

// ── INTRO ──
function showIntro(){
  document.getElementById('q-stage').innerHTML=`
    <div class="q-card" style="text-align:center;padding:52px 32px;">
      <span style="font-size:52px;display:block;margin-bottom:20px;animation:float 4s ease-in-out infinite;">✦</span>
      <p style="font-style:italic;font-size:clamp(14px,3vw,18px);line-height:2.1;color:rgba(238,242,255,0.75);margin-bottom:36px;">
        7つの問いに答えてください。<br>
        あなたの宇宙的な世界観の型が明らかになります。<br>
        <span style="color:var(--lavender)">答えに正解も間違いもない。</span><br>
        最も「響く」ものを選んでください。
      </p>
      <button onclick="nextQ()" style="font-style:italic;font-size:20px;letter-spacing:2px;padding:16px 48px;background:none;cursor:pointer;border:1px solid rgba(167,139,250,0.5);color:var(--lavender);transition:all 0.3s;" onmouseover="this.style.background='rgba(107,33,232,0.15)'" onmouseout="this.style.background='none'">
        診断を始める →
      </button>
    </div>`;
}

// ── QUESTIONS ──
function nextQ(){
  currentQ++;
  if(currentQ>=QUESTIONS.length){startResult();return;}
  const q=QUESTIONS[currentQ];
  selectedOpt=null;
  cosmosH=q.hue;
  const pw=document.getElementById('progress-wrap');
  pw.style.display='block';
  document.getElementById('prog-fill').style.width=`${(currentQ/QUESTIONS.length)*100}%`;
  document.getElementById('prog-cur').textContent=`問い ${currentQ+1}`;
  document.getElementById('prog-tot').textContent=`/ ${QUESTIONS.length}`;

  document.getElementById('q-stage').innerHTML=`
    <div class="q-card">
      <div class="q-num">QUESTION ${q.num} / ${QUESTIONS.length}</div>
      <span class="q-symbol">${q.symbol}</span>
      <div class="q-text">${q.text}</div>
      <div class="options">
        ${q.opts.map((o,i)=>`<button class="opt" onclick="selectOpt(${i})" id="opt-${i}"><span class="opt-label">${o.label}</span>${o.text}</button>`).join('')}
      </div>
      <div class="next-wrap"><button id="next-btn" onclick="confirmOpt()" disabled>次の問いへ →</button></div>
    </div>`;
}

function selectOpt(i){
  document.querySelectorAll('.opt').forEach(el=>el.classList.remove('selected'));
  document.getElementById(`opt-${i}`).classList.add('selected');
  selectedOpt=i;
  document.getElementById('next-btn').disabled=false;
}

function confirmOpt(){
  if(selectedOpt===null)return;
  const q=QUESTIONS[currentQ];
  const s=q.opts[selectedOpt].score;
  Object.entries(s).forEach(([k,v])=>scores[k]=(scores[k]||0)+v);
  answers.push({q:q.text,a:q.opts[selectedOpt].text});
  const card=document.querySelector('.q-card');
  card.style.transition='opacity 0.3s,transform 0.3s';
  card.style.opacity='0';card.style.transform='translateY(-12px)';
  setTimeout(nextQ,320);
}

// ── RESULT ──
function getTopType(){return Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];}

async function startResult(){
  document.getElementById('progress-wrap').style.display='none';
  document.getElementById('q-stage').innerHTML='';
  document.getElementById('loading').classList.add('active');

  const topType=getTopType();
  const td=TYPES[topType];
  cosmosH=td.hue;

  if(!apiKey){
    document.getElementById('loading').classList.remove('active');
    renderResult(topType,{
      essence:`あなたは${td.name}——宇宙の謎を抱えたまま、境界を越え続ける存在です。`,
      mission:'APIキーを接続すると、あなただけの完全な宇宙的使命が解読されます。',
      traits:[{key:'核心的衝動',val:'未知への越境'},{key:'知覚スタイル',val:'直感先行型'},{key:'宇宙的役割',val:'探求者'},{key:'影の側面',val:'答えを求めすぎること'},{key:'覚醒のトリガー',val:'禁断の問い'},{key:'共鳴する周波数',val:'963Hz'}],
      affinity:['宇宙','境界','直感','探求','真実','∞'],
    });
    return;
  }

  const prompt=`あなたはINFINITY WORLD ∞ の宇宙的アーキタイプ診断システムです。
診断タイプ: ${td.name}（${td.en}）
スコア: ${Object.entries(scores).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`${k}:${v}`).join(', ')}
回答:
${answers.map((a,i)=>`Q${i+1}: ${a.q} → 「${a.a}」`).join('\n')}

以下のJSONのみ返してください（backtick不要）:
{"essence":"<詩的な本質の説明80〜120字>","mission":"<具体的な宇宙的使命100〜150字>","traits":[{"key":"核心的衝動","val":"<10字以内>"},{"key":"知覚スタイル","val":"<10字以内>"},{"key":"宇宙的役割","val":"<10字以内>"},{"key":"影の側面","val":"<10字以内>"},{"key":"覚醒のトリガー","val":"<10字以内>"},{"key":"共鳴する周波数","val":"<10字以内>"}],"affinity":["<kw>","<kw>","<kw>","<kw>","<kw>","<kw>"]}`;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})
    });
    const data=await res.json();
    let raw=(data.content?.[0]?.text||'{}').replace(/```json|```/g,'').trim();
    const ai=JSON.parse(raw);
    document.getElementById('loading').classList.remove('active');
    renderResult(topType,ai);
  }catch(e){
    document.getElementById('loading').classList.remove('active');
    renderResult(topType,{
      essence:`あなたは${td.name}。宇宙の深淵を見つめながら、未知の真実を求め続ける存在。`,
      mission:'隠された知識を探求し、目覚めつつある者たちへ光を届けること。',
      traits:[{key:'核心的衝動',val:'越境と探求'},{key:'知覚スタイル',val:'直感先行'},{key:'宇宙的役割',val:'解読者'},{key:'影の側面',val:'孤独'},{key:'覚醒のトリガー',val:'禁断の問い'},{key:'共鳴する周波数',val:'963Hz'}],
      affinity:['宇宙','直感','境界','真実','覚醒','∞'],
    });
  }
}

function renderResult(topType,ai){
  const td=TYPES[topType];
  const el=document.getElementById('result');
  el.style.display='block';
  el.innerHTML=`
    <div class="result-sigil">
      <span class="sigil-symbol">${td.symbol}</span>
      <div class="type-label">YOUR COSMIC ARCHETYPE</div>
      <div class="type-name">${td.name}</div>
      <div class="type-en">${td.en}</div>
    </div>
    <div class="divider"></div>
    <div style="margin-bottom:20px"><div class="rs-label">◈ 宇宙的本質</div><div class="essence-box" id="ess"></div></div>
    <div style="margin-bottom:20px"><div class="rs-label">◈ あなたの使命</div><div class="mission-box" id="mis"></div></div>
    <div style="margin-bottom:20px"><div class="rs-label">◈ アーキタイプの特性</div>
      <div class="traits-grid">${(ai.traits||[]).map(t=>`<div class="trait-pill"><span class="trait-key">${t.key}</span>${t.val}</div>`).join('')}</div>
    </div>
    <div style="margin-bottom:32px"><div class="rs-label">◈ 共鳴キーワード</div>
      <div class="affinity-row">${(ai.affinity||[]).map(a=>`<span class="affinity-tag">${a}</span>`).join('')}</div>
    </div>
    <button class="restart-btn" onclick="restart()">◈ もう一度診断する</button>`;

  typewrite('ess',ai.essence||'',22);
  setTimeout(()=>typewrite('mis',ai.mission||'',22),(ai.essence||'').length*22+500);
  el.scrollIntoView({behavior:'smooth',block:'start'});
}

function typewrite(id,text,speed){
  const el=document.getElementById(id);if(!el)return;
  el.textContent='';let i=0;
  const t=setInterval(()=>{if(i<text.length){el.textContent+=text[i++];}else clearInterval(t);},speed);
}

function restart(){
  currentQ=-1;scores={};answers=[];selectedOpt=null;cosmosH=260;
  document.getElementById('result').style.display='none';
  document.getElementById('progress-wrap').style.display='none';
  showIntro();window.scrollTo({top:0,behavior:'smooth'});
}

showIntro();
</script>
</body>
</html>
